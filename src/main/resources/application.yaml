spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/taskqueue
    username: taskqueue
    password: taskqueue
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: validate          
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 20          
          max-idle: 10
          min-idle: 2

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

taskqueue:
  queues:
    high_priority:
      concurrency: 10
      max-retries: 5
      base-delay-ms: 500
    default:
      concurrency: 4
      max-retries: 3
      base-delay-ms: 1000
  worker:
    poll-interval-ms: 1000
    handler-timeout-ms: 30000

  scheduler:
    poll-interval-ms: 1000        
    lock-ttl-ms: 10000

  reaper:
    stuck-threshold-minutes: 5   
    poll-interval-ms: 30000

logging:
  level:
    com.nganhcc.task_queue: DEBUG
    org.springframework: INFO
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} [%X{taskId}] - %msg%n"
